<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>数据看板 · wangyongqiang.top</title>
<style>

  .hero { max-width:960px; margin:0 auto; padding:48px 24px; }

  .card { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); border-radius:16px; padding:24px; backdrop-filter:blur(8px); transition:transform .2s, background .2s; text-decoration:none; color:inherit; display:block; }
  .card:hover { transform:translateY(-3px); background:rgba(255,255,255,.12); }
  .card h2 { font-size:18px; margin-bottom:8px; }
  .card .meta { font-size:13px; color:#8c8c9a; margin-top:8px; }
  .placeholder { font-size:13px; color:#69b1ff; margin-top:12px; }
  footer { text-align:center; color:#6c6c7d; font-size:12px; margin-top:48px; padding-bottom:24px; }
</style>
</head>
<body>
  <div class="hero">

  </div>
</body>
</html>
