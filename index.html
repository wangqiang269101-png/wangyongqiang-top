<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="新商考核预警 · 城市风险预警与模块明细">
<title>新商考核预警 · wangyongqiang.top</title>
<link rel="stylesheet" href="shared/site.css">
<script src="shared/nav.js" defer></script>
<style>
:root{--nav:#101828;--ink:#172033;--muted:#667085;--line:#e7ebf2;--bg:#f5f7fb;--blue:#2563eb;--red:#dc2626;--orange:#ea580c;--amber:#d97706}
.source{color:var(--blue);font-size:13px;text-decoration:none;white-space:nowrap}
.kpis{display:grid;grid-template-columns:repeat(5,minmax(140px,1fr));gap:14px;margin:18px 0}.kpi,.module,.panel{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 2px 8px #10182809}
.kpi{padding:18px}.kpi .label{color:var(--muted);font-size:12px}.kpi .value{font-size:28px;font-weight:780;margin-top:5px}.kpi .hint{font-size:12px;color:#98a2b3;margin-top:3px}
.modules{display:grid;grid-template-columns:repeat(6,minmax(130px,1fr));gap:12px;margin-bottom:18px}.module{padding:15px;cursor:pointer;transition:.18s}.module:hover{transform:translateY(-2px);border-color:#b8c7f6}.module.active{border-color:var(--blue);box-shadow:0 0 0 2px #2563eb18}.module-name{font-weight:700;margin-bottom:9px}.module-numbers{display:flex;gap:12px;font-size:12px;color:var(--muted)}.module-numbers b{display:block;font-size:18px;color:var(--ink)}
.panel{overflow:hidden}.controls{padding:15px 16px;border-bottom:1px solid var(--line);display:grid;grid-template-columns:minmax(180px,1.2fr) minmax(200px,2fr) repeat(4,minmax(120px,1fr));gap:10px}input,select{width:100%;border:1px solid #d0d5dd;background:#fff;border-radius:9px;padding:9px 11px;color:var(--ink);outline:none}input:focus,select:focus{border-color:#6b8df5;box-shadow:0 0 0 3px #2563eb12}
.table-wrap{overflow:auto;max-height:680px}table{border-collapse:separate;border-spacing:0;width:100%;min-width:1080px}th{position:sticky;top:0;background:#f9fafb;color:#475467;text-align:left;font-size:12px;font-weight:650;z-index:2}th,td{padding:11px 12px;border-bottom:1px solid #eef1f5;white-space:nowrap}tbody tr{cursor:pointer}tbody tr:hover{background:#f7f9ff}.city{font-weight:700}.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:650}.sev-4{background:#fef2f2;color:var(--red)}.sev-3{background:#fff7ed;color:var(--orange)}.sev-2{background:#fffbeb;color:var(--amber)}.sev-1{background:#eff6ff;color:#2563eb}.sev-0{background:#f2f4f7;color:#667085}.empty,.loading{padding:50px;text-align:center;color:var(--muted)}.count{padding:10px 16px;color:var(--muted);font-size:12px;border-top:1px solid var(--line)}
dialog{border:0;border-radius:18px;width:min(920px,calc(100vw - 32px));max-height:86vh;padding:0;box-shadow:0 24px 80px #10182855}dialog::backdrop{background:#10182888}.modal-head{position:sticky;top:0;background:#fff;display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--line);z-index:2}.modal-title{font-size:19px;font-weight:760}.close{border:0;background:#f2f4f7;border-radius:9px;font-size:20px;width:36px;height:36px;cursor:pointer}.detail{padding:20px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;overflow:auto;max-height:calc(86vh - 80px)}.detail-item{background:#f8fafc;border-radius:10px;padding:11px 12px;min-width:0}.detail-label{font-size:11px;color:var(--muted);white-space:normal}.detail-value{font-weight:650;margin-top:3px;word-break:break-word}
.note{margin-top:12px;color:#98a2b3;font-size:12px;text-align:right}
@media(max-width:1100px){.controls{grid-template-columns:1fr 1fr}.kpis{grid-template-columns:repeat(3,1fr)}.modules{grid-template-columns:repeat(3,1fr)}}
@media(max-width:640px){.kpis,.modules{grid-template-columns:1fr 1fr}.controls{grid-template-columns:1fr}.detail{grid-template-columns:1fr 1fr}}
</style>
</head>
<body data-page="xsh">
<main class="page-wrap">
  <section class="page-hero"><div><h1>新商考核预警</h1><div class="subtitle" id="meta">自动同步：2026-07-15 20:59</div></div><a class="source" href="http://47.112.178.78:8100/#/de-link/EAM2AO9a" target="_blank" rel="noopener">查看源看板 ↗</a></section>
  <section class="kpis">
    <div class="kpi"><div class="label">覆盖城市</div><div class="value" id="total">—</div><div class="hint" id="regionHint">— 个区域</div></div>
    <div class="kpi"><div class="label">综合高风险</div><div class="value" style="color:var(--red)" id="highRisk">—</div><div class="hint">排名 0%–10%</div></div>
    <div class="kpi"><div class="label">综合风险</div><div class="value" style="color:var(--orange)" id="risk">—</div><div class="hint">排名 10%–30%</div></div>
    <div class="kpi"><div class="label">重点关注</div><div class="value" style="color:var(--amber)" id="watch">—</div><div class="hint">排名 30%–50%</div></div>
    <div class="kpi"><div class="label">历史批次</div><div class="value" id="batchCount">—</div><div class="hint" id="sourceHint">源数据 — 行</div></div>
  </section>
  <section class="modules" id="modules"></section>
  <section class="panel">
    <div class="controls">
      <select id="date"></select>
      <input id="search" placeholder="搜索城市或区域…">
      <select id="region"><option value="">全部区域</option></select>
      <select id="level"><option value="">全部城市级别</option></select>
      <select id="severity"><option value="">全部风险等级</option><option value="4">高风险 0%–10%</option><option value="3">风险 10%–30%</option><option value="2">关注 30%–50%</option><option value="1">一般 50%–70%</option><option value="0">低风险 70%以上 / 不预警</option></select>
    </div>
    <div class="table-wrap"><table><thead><tr><th>城市</th><th>区域</th><th>级别</th><th>综合排名</th><th>外卖</th><th>团购</th><th>履约</th><th>零售</th><th>商业增值</th><th>用户体验</th></tr></thead><tbody id="rows"><tr><td class="loading" colspan="10">加载数据中…</td></tr></tbody></table></div>
    <div class="count" id="count"></div>
  </section>
  <div class="note">排名越低风险越高：0%–10% 为高风险，10%–30% 为风险；70% 以上为相对低风险。点击城市可查看全部指标。</div>
</main>
<dialog id="detail"><div class="modal-head"><div><div class="modal-title" id="detailTitle"></div><div class="subtitle" id="detailSub"></div></div><button class="close" onclick="detail.close()">×</button></div><div class="detail" id="detailGrid"></div></dialog>
<script>
const moduleFields=["外卖模块预警", "团购模块预警", "履约模块预警", "零售模块预警", "商业增值模块预警", "用户体验模块预警"];
let DATA=null,activeModule="",filtered=[],currentRows=[];
const $=id=>document.getElementById(id);
const esc=v=>String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const sev=v=>{v=String(v??"");if(!v||v.includes("不预警")||v.includes("暂不预警"))return 0;if(v.includes("0%-10%"))return 4;if(v.includes("10%-30%"))return 3;if(v.includes("30%-50%"))return 2;if(v.includes("50%-70%"))return 1;return 0};
const badge=v=>`<span class="badge sev-${sev(v)}">${esc(v||"—")}</span>`;
function summarize(rows){
  const regions=[...new Set(rows.map(r=>r["区域"]).filter(Boolean))];
  const order=DATA.region_order||[];
  regions.sort((a,b)=>{const ia=order.indexOf(a),ib=order.indexOf(b);return(ia<0?999:ia)-(ib<0?999:ib)||a.localeCompare(b,"zh-CN")});
  const levels=[...new Set(rows.map(r=>r["城市级别"]).filter(Boolean))].sort();
  const moduleSummary=moduleFields.map(field=>{
    const values=rows.map(r=>r[field]);
    return{name:field.replace("模块预警",""),field,high:values.filter(v=>sev(v)>=4).length,risk:values.filter(v=>sev(v)===3).length,watch:values.filter(v=>sev(v)===2).length,active:values.filter(v=>sev(v)>0).length};
  });
  const sorted=[...rows].sort((a,b)=>sev(b["综合排名"])-sev(a["综合排名"])||String(a["区域"]||"").localeCompare(String(b["区域"]||""))||String(a["城市名"]||"").localeCompare(String(b["城市名"]||"")));
  return{rows:sorted,regions,levels,module_summary:moduleSummary,total:rows.length,high_risk:rows.filter(r=>sev(r["综合排名"])>=4).length,risk:rows.filter(r=>sev(r["综合排名"])===3).length,watch:rows.filter(r=>sev(r["综合排名"])===2).length};
}
function applyDate(date){
  const all=DATA.all_rows||DATA.rows||[];
  currentRows=all.filter(r=>String(r["数据日期"]||"")===date);
  const s=summarize(currentRows);
  $("total").textContent=s.total;
  $("regionHint").textContent=`${s.regions.length} 个区域`;
  $("highRisk").textContent=s.high_risk;
  $("risk").textContent=s.risk;
  $("watch").textContent=s.watch;
  $("batchCount").textContent=DATA.available_dates.length;
  $("sourceHint").textContent=`源数据 ${DATA.total_source_rows} 行`;
  $("meta").textContent=`数据日期：${date} · 自动同步：${DATA.synced_at}`;
  $("region").innerHTML='<option value="">全部区域</option>'+s.regions.map(v=>`<option>${esc(v)}</option>`).join("");
  $("level").innerHTML='<option value="">全部城市级别</option>'+s.levels.map(v=>`<option>${esc(v)}</option>`).join("");
  $("modules").innerHTML=s.module_summary.map(m=>`<div class="module" data-field="${esc(m.field)}"><div class="module-name">${esc(m.name)}</div><div class="module-numbers"><span><b style="color:var(--red)">${m.high}</b>高风险</span><span><b>${m.active}</b>有预警</span></div></div>`).join("");
  document.querySelectorAll(".module").forEach(el=>el.onclick=()=>{activeModule=activeModule===el.dataset.field?"":el.dataset.field;document.querySelectorAll(".module").forEach(x=>x.classList.toggle("active",x.dataset.field===activeModule));render()});
  DATA.rows=s.rows;DATA.regions=s.regions;DATA.levels=s.levels;DATA.module_summary=s.module_summary;
  render();
}
function init(){
  ["search","region","level","severity"].forEach(id=>$(id).addEventListener(id==="search"?"input":"change",render));
  $("date").addEventListener("change",()=>applyDate($("date").value));
  fetch("./data/warning.json?_="+Date.now()).then(r=>r.json()).then(data=>{
    DATA=data;
    $("date").innerHTML=data.available_dates.map(d=>`<option value="${esc(d)}"${d===data.data_date?" selected":""}>${esc(d)}</option>`).join("");
    applyDate($("date").value||data.data_date);
  }).catch(err=>{
    $("rows").innerHTML=`<tr><td class="empty" colspan="10">数据加载失败：${esc(err.message)}</td></tr>`;
  });
}
function render(){
  if(!DATA)return;
  const q=$("search").value.trim().toLowerCase(),region=$("region").value,level=$("level").value,s=$("severity").value;
  filtered=DATA.rows.filter(r=>{const field=activeModule||"综合排名";return(!q||`${r["城市名"]||""} ${r["区域"]||""}`.toLowerCase().includes(q))&&(!region||r["区域"]===region)&&(!level||r["城市级别"]===level)&&(s===""||sev(r[field])===Number(s))});
  $("rows").innerHTML=filtered.length?filtered.map((r,i)=>`<tr data-i="${i}"><td class="city">${esc(r["城市名"])}</td><td>${esc(r["区域"])}</td><td>${esc(r["城市级别"]||"—")}</td><td>${badge(r["综合排名"])}</td>${moduleFields.map(f=>`<td>${badge(r[f])}</td>`).join("")}</tr>`).join(""):`<tr><td class="empty" colspan="10">没有符合条件的数据</td></tr>`;
  $("count").textContent=`显示 ${filtered.length} / ${DATA.rows.length} 个城市${activeModule?" · 当前模块："+activeModule.replace("模块预警",""):""}`;
  document.querySelectorAll("#rows tr[data-i]").forEach(tr=>tr.onclick=()=>showDetail(filtered[Number(tr.dataset.i)]));
}
function showDetail(r){
  $("detailTitle").textContent=`${r["城市名"]||"城市"} · 指标明细`;
  $("detailSub").textContent=`${r["大区"]?r["大区"]+" · ":""}${r["区域"]||""} · ${r["城市级别"]||""} · 数据日期 ${r["数据日期"]||$("date").value}`;
  const preferred=["综合排名",...moduleFields],rest=(DATA.fields||[]).filter(f=>!["数据日期","城市名","区域","城市级别",...preferred].includes(f));
  $("detailGrid").innerHTML=[...preferred,...rest].filter((v,i,a)=>a.indexOf(v)===i).map(f=>`<div class="detail-item"><div class="detail-label">${esc(f)}</div><div class="detail-value">${f.includes("预警")||f==="综合排名"?badge(r[f]):esc(r[f]??"—")}</div></div>`).join("");
  $("detail").showModal();
}
detail.addEventListener("click",e=>{if(e.target===detail)detail.close()});
init();
</script>
</body></html>
