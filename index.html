<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据看板 · wangyongqiang.top</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif; background:linear-gradient(135deg,#1e1e2d 0%,#2d3561 100%); min-height:100vh; color:#fff; }
  .hero { max-width:960px; margin:0 auto; padding:48px 24px; }
  .hero h1 { font-size:32px; font-weight:700; }
  .hero p { color:#a3a3b3; margin-top:10px; font-size:15px; line-height:1.6; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:20px; margin-top:36px; }
  .card { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); border-radius:16px; padding:24px; backdrop-filter:blur(8px); transition:transform .2s, background .2s; text-decoration:none; color:inherit; display:block; }
  .card:hover { transform:translateY(-3px); background:rgba(255,255,255,.12); }
  .card h2 { font-size:18px; margin-bottom:8px; }
  .card .meta { font-size:13px; color:#8c8c9a; }
  .stats { display:flex; gap:20px; margin-top:16px; flex-wrap:wrap; }
  .stat { font-size:13px; }
  .stat b { display:block; font-size:22px; color:#69b1ff; margin-bottom:4px; }
  footer { text-align:center; color:#6c6c7d; font-size:12px; margin-top:48px; padding-bottom:24px; }
</style>
</head>
<body>
  <div class="hero">
    <h1>📊 业务数据看板</h1>
    <p>wangyongqiang.top · 外卖/团购业务数据分析对外展示<br>最后更新：2026-07-15 00:43</p>
    <div class="grid">
      <a class="card" href="todo.html">
        <h2>📋 城市 Todo 达成</h2>
        <div class="meta">美团业务要求列表 · 城市/负责人/进度追踪</div>
        <div class="stats">
          <div class="stat"><b>39</b>任务</div>
          <div class="stat"><b>25</b>城市</div>
          <div class="stat"><b>10</b>已完成</div>
          <div class="stat"><b>4</b>未启动</div>
        </div>
      </a>
      <a class="card" href="dashboard.html">
        <h2>📈 综合数据看板</h2>
        <div class="meta">新商评价 · 广告达成 · 夜宵复盘 · 基本功</div>
        <div class="stats">
          <div class="stat"><b>6</b>核心板块</div>
          <div class="stat"><b>多</b>城市维度</div>
        </div>
      </a>
      <a class="card" href="data/todo.json">
        <h2>🔗 开放数据 API</h2>
        <div class="meta">静态 JSON 数据接口，可供前端/脚本读取</div>
        <div class="stats"><div class="stat"><b>JSON</b>todo.json</div></div>
      </a>
    </div>
    <footer>wangyongqiang.top · 直抓同步</footer>
  </div>
</body>
</html>
